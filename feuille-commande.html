<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>GLPRB — Feuille de Commande FC 101 (2026)</title>
<style>
:root{--navy:#13325b;--navy-2:#1c4a86;--ink:#1a2230;--muted:#6b7686;--line:#e3e8ef;--bg:#f5f7fa;--ok:#1f9d57;--bleu:#1c4a86;--jaune:#b8860b}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);-webkit-text-size-adjust:100%}
.wrap{max-width:1040px;margin:0 auto;padding:16px 14px 140px}
.head{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:0 1px 3px rgba(16,40,80,.05)}
.head-top{display:flex;flex-wrap:wrap;justify-content:space-between;gap:14px;align-items:flex-start}
.brand h1{margin:0;font-size:1.32rem;color:var(--navy);letter-spacing:.2px}
.brand .sub{margin:4px 0 0;color:var(--muted);font-size:.86rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.head-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.prices{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-size:.82rem;font-weight:700;padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:#fff}
.chip.bleu{color:var(--bleu);border-color:#c9dcff;background:#f1f6ff}.chip.jaune{color:var(--jaune);border-color:#f0e2bd;background:#fdf8ec}
.gear{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:1.05rem;color:var(--navy)}
.gear:hover{border-color:var(--navy-2)}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
.field label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:1rem;background:#fff;color:var(--ink)}
.field input:focus{outline:none;border-color:var(--navy-2);box-shadow:0 0 0 3px rgba(28,74,134,.12)}
.section{margin-top:22px}
.section-title{background:var(--navy);color:#fff;padding:11px 16px;border-radius:10px 10px 0 0;font-size:1rem;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:10px}
.section-title .badge{margin-left:auto;font-size:.72rem;font-weight:600;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:999px}
.list{background:#fff;border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-top:1px solid var(--line)}
.row:first-child{border-top:none}.row:nth-child(even){background:#fafbfd}
.thumbwrap{position:relative;width:54px;height:54px;flex:0 0 auto}
.thumb{width:54px;height:54px;border-radius:8px;object-fit:cover;background:#eef1f6;border:1px solid var(--line);display:block;cursor:zoom-in}
.thumb.ph{display:flex;align-items:center;justify-content:center;color:#aab2c0;font-size:.55rem;text-align:center;cursor:default}
.zoomhint{position:absolute;bottom:-7px;left:-7px;width:22px;height:22px;border-radius:999px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:.66rem;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.15)}
body.admin .zoomhint{display:none}
.cam,.rstp{position:absolute;display:none;align-items:center;justify-content:center;border:none;cursor:pointer;border-radius:999px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.cam{bottom:-7px;right:-7px;width:24px;height:24px;background:var(--navy);color:#fff;font-size:.72rem}
.rstp{top:-7px;right:-7px;width:22px;height:22px;background:#c0392b;color:#fff;font-size:.7rem}
body.admin .cam{display:flex}body.admin .thumbwrap.has-override .rstp{display:flex}
.idcol{flex:0 0 auto;width:74px}
.idcol .num{font-weight:800;font-size:1.02rem;color:var(--ink);line-height:1.1}
.idcol .clr{font-size:.7rem;font-weight:700;color:var(--bleu);margin-top:2px}
.sizes{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;flex:1 1 auto;min-width:0}
.cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.cell .lt{font-size:.68rem;font-weight:700;color:var(--muted)}
.cell input{width:100%;max-width:54px;text-align:center;padding:7px 2px;border:1px solid var(--line);border-radius:7px;font-size:.95rem;background:#fff;color:var(--ink);-moz-appearance:textfield}
.cell input::-webkit-outer-spin-button,.cell input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.cell input:focus{outline:none;border-color:var(--navy-2);box-shadow:0 0 0 3px rgba(28,74,134,.12)}
.cell input.has{border-color:var(--navy-2);background:#f1f6ff;font-weight:700;color:var(--navy)}
.cell.off .lt{color:#c8cfdb}
.cell.off .x{width:100%;max-width:54px;height:34px;border-radius:7px;background:repeating-linear-gradient(135deg,#f0f2f6,#f0f2f6 5px,#e7eaf0 5px,#e7eaf0 10px);border:1px dashed #d4d9e2}
.bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);box-shadow:0 -4px 18px rgba(16,40,80,.08);z-index:50}
.bar-in{max-width:1040px;margin:0 auto;padding:12px 14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.totals{display:flex;gap:22px;align-items:baseline}
.totals .lbl{font-size:.74rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.totals .big{font-size:1.5rem;font-weight:800;color:var(--navy)}.totals .cnt{font-size:1.05rem;font-weight:700;color:var(--ink)}
.spacer{flex:1 1 auto}
.btn{border:none;border-radius:10px;padding:13px 22px;font-size:1rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-send{background:var(--navy);color:#fff}.btn-send:hover{background:var(--navy-2)}.btn-send:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--navy)}.btn-ghost:hover{border-color:var(--navy-2)}
.adminbar{display:none;position:fixed;top:0;left:0;right:0;z-index:60;background:#13325b;color:#fff;padding:9px 14px;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 12px rgba(0,0,0,.2)}
body.admin .adminbar{display:flex}body.admin .wrap{padding-top:60px}
.adminbar .ab-t{font-weight:700;font-size:.9rem}.adminbar .ab-t small{font-weight:500;opacity:.85}
.ab-sp{flex:1 1 auto}
.ab-btn{border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:.86rem;cursor:pointer}
.ab-export{background:#c8f135;color:#13325b}.ab-close{background:rgba(255,255,255,.16);color:#fff}
/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(10,16,28,.94);z-index:200;display:none;flex-direction:column}
.lb.show{display:flex}
.lb-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;color:#fff;flex:0 0 auto}
.lb-bar .lb-cap{font-weight:700;font-size:1.05rem}
.lb-bar .lb-sp{flex:1 1 auto}
.lb-bar button{background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-weight:700;cursor:pointer;font-size:.9rem}
.lb-stage{flex:1 1 auto;overflow:auto;display:flex;align-items:center;justify-content:center;padding:0 16px 20px;-webkit-overflow-scrolling:touch}
.lb-stage img{max-width:100%;max-height:100%;border-radius:10px;background:#fff;cursor:zoom-in;transition:none;display:block}
.lb-stage.zoom{align-items:flex-start;justify-content:flex-start;cursor:zoom-out}
.lb-stage.zoom img{max-width:none;max-height:none;width:1600px;cursor:zoom-out}
.lb-load{color:#fff;opacity:.85;font-weight:600}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 20px;border-radius:10px;font-weight:600;z-index:300;opacity:0;pointer-events:none;transition:.25s;max-width:90vw;text-align:center}
.toast.show{opacity:1}.toast.ok{background:var(--ok)}.toast.err{background:#c0392b}
.note{text-align:center;color:var(--muted);font-size:.8rem;margin:26px 0 0}.note code{background:#eef1f6;padding:1px 6px;border-radius:5px}
@media(max-width:720px){.wrap{padding:12px 10px 150px}.fields{grid-template-columns:1fr}.sizes{grid-template-columns:repeat(4,1fr)}.brand h1{font-size:1.12rem}.totals .big{font-size:1.3rem}.btn{padding:12px 16px;flex:1 1 auto}.lb-stage.zoom img{width:1100px}}
</style>
</head>

const LS_KEY = "glprb_photo_overrides";
let overrides = {};
try { overrides = JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch(e){ overrides = {}; }
function saveOverrides(){ try { localStorage.setItem(LS_KEY, JSON.stringify(overrides)); } catch(e){ toast("Mémoire pleine : moins de photos à la fois.", "err"); } }
const hiresSet = new Set(HIRES);
function getThumb(num){ return OVR[num] || overrides[num] || PHOTOS[num] || null; }
function getHiRes(num){ return OVR[num] || overrides[num] || (hiresSet.has(num) ? ('img/' + num + '.jpg') : (PHOTOS[num] || null)); }

const fmt = n => n.toFixed(2).replace('.', ',') + ' $';
function toast(msg, type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show '+(type||''); clearTimeout(t._h); t._h=setTimeout(()=>t.className='toast',4200); }

let _ejsP=null;
function ensureEmailJS(){ if(window.emailjs) return Promise.resolve(window.emailjs); if(_ejsP) return _ejsP;
  _ejsP=new Promise((res,rej)=>{const s=document.createElement('script');s.src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";s.onload=()=>res(window.emailjs);s.onerror=()=>rej(new Error("EmailJS"));document.head.appendChild(s);}); return _ejsP; }

const root = document.getElementById('sections');
SECTIONS.forEach(sec => {
  const s=document.createElement('div'); s.className='section';
  const head=document.createElement('div'); head.className='section-title';
  head.innerHTML='<span>'+sec.title+'</span><span class="badge">'+sec.products.length+' modèles</span>';
  const list=document.createElement('div'); list.className='list';
  sec.products.forEach(p => {
    const row=document.createElement('div'); row.className='row';
    const avail=new Set(p.cols); let cells='';
    ALL.forEach(L => {
      if(avail.has(L)) cells+='<div class="cell"><span class="lt">'+L+'</span><input type="number" min="0" inputmode="numeric" data-num="'+p.num+'" data-size="'+L+'" data-price="'+PRICE.Bleu+'"></div>';
      else cells+='<div class="cell off"><span class="lt">'+L+'</span><div class="x"></div></div>';
    });
    row.innerHTML='<div class="thumbwrap" data-num="'+p.num+'"></div><div class="idcol"><div class="num">'+p.num+'</div><div class="clr">Bleu</div></div><div class="sizes">'+cells+'</div>';
    list.appendChild(row);
  });
  s.appendChild(head); s.appendChild(list); root.appendChild(s);
});

function paintThumb(wrap){
  const num=wrap.dataset.num; const src=getThumb(num); const has=!!overrides[num]||!!OVR[num];
  wrap.classList.toggle('has-override', has);
  let html = src ? '<img class="thumb" src="'+src+'" alt="Produit '+num+'" data-enlarge="'+num+'" loading="lazy">'
                 : '<div class="thumb ph" data-enlarge="'+num+'">aucune<br>photo</div>';
  if (src) html += '<span class="zoomhint">🔍</span>';
  html += '<button type="button" class="cam" data-cam="'+num+'" title="Changer la photo">📷</button>';
  html += '<button type="button" class="rstp" data-rst="'+num+'" title="Photo d\'origine">↺</button>';
  wrap.innerHTML=html;
}
function paintNum(num){ document.querySelectorAll('.thumbwrap[data-num="'+CSS.escape(num)+'"]').forEach(paintThumb); }
document.querySelectorAll('.thumbwrap').forEach(paintThumb);

      lbStage=document.getElementById('lbStage'), lbLoad=document.getElementById('lbLoad'), lbZoom=document.getElementById('lbZoom');
function openLightbox(num){
  const src=getHiRes(num); if(!src) return;
  lbCap.textContent='Produit N° '+num;
  lbStage.classList.remove('zoom'); lbZoom.textContent='Zoom +';
  lbImg.style.display='none'; lbLoad.style.display='block';
  lbImg.onload=()=>{ lbLoad.style.display='none'; lbImg.style.display='block'; };
  lbImg.onerror=()=>{ lbLoad.textContent='Image indisponible'; };
  lbImg.src=src; lb.classList.add('show');
}
function closeLightbox(){ lb.classList.remove('show'); lbImg.src=''; lbStage.classList.remove('zoom'); }
function toggleZoom(){ const z=lbStage.classList.toggle('zoom'); lbZoom.textContent=z?'Zoom −':'Zoom +'; lbStage.scrollTop=0; lbStage.scrollLeft=0; }
document.getElementById('lbClose').addEventListener('click', closeLightbox);
lbZoom.addEventListener('click', toggleZoom);
lbImg.addEventListener('click', toggleZoom);
lbStage.addEventListener('click', e => { if(e.target===lbStage) closeLightbox(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });

/* Mode gestion : upload */
const fileInput=document.getElementById('fileInput'); let camTarget=null;
function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader(); fr.onerror=reject;
    fr.onload=()=>{ const img=new Image(); img.onerror=reject;
      img.onload=()=>{ const max=1400; let w=img.width,h=img.height; const sc=Math.min(1,max/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
        const c=document.createElement('canvas'); c.width=w; c.height=h; const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',0.82)); };
      img.src=fr.result; };
    fr.readAsDataURL(file);
  });
}
fileInput.addEventListener('change', async () => {
  const f=fileInput.files&&fileInput.files[0]; fileInput.value='';
  if(!f||!camTarget) return;
  try{ overrides[camTarget]=await fileToDataURL(f); saveOverrides(); paintNum(camTarget); updateAdminCount(); toast('Photo du produit '+camTarget+' mise à jour ✓','ok'); }
  catch(e){ toast("Image illisible.","err"); }
});
root.addEventListener('click', e => {
  const cam=e.target.closest('[data-cam]'); if(cam){ camTarget=cam.dataset.cam; fileInput.click(); return; }
  const rst=e.target.closest('[data-rst]'); if(rst){ delete overrides[rst.dataset.rst]; saveOverrides(); paintNum(rst.dataset.rst); updateAdminCount(); toast('Photo d\'origine rétablie.',''); return; }
  const enl=e.target.closest('[data-enlarge]'); if(enl){ openLightbox(enl.dataset.enlarge); }
});

function updateAdminCount(){ const n=Object.keys(overrides).length; document.getElementById('abCount').innerHTML=n?'<small>· '+n+' photo(s) modifiée(s)</small>':'<small>· touchez 📷 pour changer une photo, puis exportez</small>'; }
function setAdmin(on){ document.body.classList.toggle('admin',on); if(on) updateAdminCount(); }
document.getElementById('gear').addEventListener('click', ()=>setAdmin(!document.body.classList.contains('admin')));
document.getElementById('abClose').addEventListener('click', ()=>setAdmin(false));
if(location.hash==='#admin'||location.hash==='#gestion') setAdmin(true);

document.getElementById('abExport').addEventListener('click', async () => {
  try{
    const res=await fetch(location.href,{cache:'no-store'}); if(!res.ok) throw new Error('fetch');
    let src=await res.text();
    const merged=Object.assign({},OVR,overrides);
    const A='/*OVR_START*/', B='/*OVR_END*/'; const i=src.indexOf(A), j=src.indexOf(B);
    if(i<0||j<0||j<i) throw new Error('markers');
    src=src.slice(0,i)+A+'\nconst OVR = '+JSON.stringify(merged)+';\n'+src.slice(j);
    const blob=new Blob([src],{type:'text/html'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='feuille-commande.html'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    toast('« feuille-commande.html » téléchargé. Remplacez-le dans le dossier puis reglissez le dossier sur Netlify.','ok');
  }catch(e){ toast("Export possible seulement quand le site est en ligne (Netlify).","err"); }
});

const inputs=()=>[...document.querySelectorAll('.sizes input')];
function recalc(){ let total=0,count=0; inputs().forEach(inp=>{const q=parseInt(inp.value,10); if(q>0){total+=q*parseFloat(inp.dataset.price);count+=q;inp.classList.add('has');}else inp.classList.remove('has');}); document.getElementById('total').innerHTML=fmt(total).replace(' ','&nbsp;'); document.getElementById('count').textContent=count; return {total,count}; }
root.addEventListener('input', recalc);
function collect(){ const items=[]; inputs().forEach(inp=>{const q=parseInt(inp.value,10); if(q>0) items.push({num:inp.dataset.num,size:inp.dataset.size,qty:q,price:parseFloat(inp.dataset.price)});}); return items; }
function summaryText(items){ return items.map(i=>'• N° '+i.num+'  taille '+i.size+'  ×'+i.qty+'  = '+fmt(i.qty*i.price)).join('\n'); }
document.getElementById('reset').addEventListener('click', ()=>{ inputs().forEach(i=>i.value=''); recalc(); });

let sending=false;
document.getElementById('send').addEventListener('click', async () => {
  if(sending) return;
  const client=document.getElementById('client').value.trim(); const date=document.getElementById('date').value;
  const items=collect(); const {total,count}=recalc();
  if(!client){ toast('Veuillez entrer le nom du client.','err'); document.getElementById('client').focus(); return; }
  if(!date){ toast('Veuillez choisir une date.','err'); document.getElementById('date').focus(); return; }
  if(!items.length){ toast('Aucun produit commandé (quantité > 0).','err'); return; }
  const params={client_name:client,order_date:date,items:summaryText(items),total:fmt(total),count:String(count),to_email:DEST_EMAIL};
  const configured=EMAILJS_PUBLIC_KEY&&!EMAILJS_PUBLIC_KEY.startsWith('VOTRE');
  if(!configured){
    const body=encodeURIComponent('Nom du client : '+client+'\nDate : '+date+'\n\nCommande :\n'+summaryText(items)+'\n\nTotal : '+fmt(total)+' ('+count+' articles)');
    const subj=encodeURIComponent('Commande GLPRB FC 101 — '+client+' — '+date);
    window.location.href='mailto:'+DEST_EMAIL+'?subject='+subj+'&body='+body;
    toast('Ouverture de votre messagerie avec la commande.',''); return;
  }
  try{ sending=true; const btn=document.getElementById('send'); btn.disabled=true; btn.textContent='Envoi…';
    const ejs=await ensureEmailJS(); ejs.init({publicKey:EMAILJS_PUBLIC_KEY}); await ejs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,params);
    toast('Commande envoyée avec succès ✓','ok'); btn.textContent='Envoyer la commande';
  }catch(e){ console.error(e); toast("Échec de l'envoi. Vérifiez la configuration EmailJS.","err"); document.getElementById('send').textContent='Envoyer la commande'; }
  finally{ sending=false; document.getElementById('send').disabled=false; }
});

document.getElementById('date').value=new Date().toISOString().slice(0,10);
recalc();
</script>
