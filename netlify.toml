[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[functions]
  node_bundler = "esbuild"
  included_files = ["dossiers/**/*.json"]

[functions."review-queue-processor"]
  schedule = "*/1 * * * *"

[functions."trial-expiry-processor"]
  schedule = "0 6 * * *"
