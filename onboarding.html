<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration | NoviaAI Rattrapeur</title>
<link rel="stylesheet" href="/assets/saas.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/app.js"></script>
</head>
<body>
<nav class="nav"><a href="/" class="logo">Novia<span>AI</span></a></nav>
<div class="wizard-wrap">
  <div class="form-box" style="max-width:520px">
    <h1>Créez votre ligne pro</h1>
    <p class="muted">~3 minutes — on vous donne un numéro local. Vous le mettez sur Google. C'est actif.</p>

    <form id="form">
      <label for="business_name">Nom du commerce *</label>
      <input id="business_name" required placeholder="Salon Éclat">

      <label for="business_phone">Cellulaire où vous répondez *</label>
      <input id="business_phone" type="tel" required placeholder="581-909-5332">
      <small class="muted" style="display:block;margin:-8px 0 16px;font-size:.85rem">Quand un client appelle votre ligne NoviaAI, c'est ce numéro qui sonne.</small>

      <label>Votre ligne professionnelle</label>
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
        <label style="display:flex;gap:10px;align-items:flex-start;font-weight:500;cursor:pointer;padding:12px;border:1px solid var(--border);border-radius:8px">
          <input type="radio" name="line_mode" value="new" checked style="margin-top:4px">
          <span><strong>Nouveau numéro NoviaAI</strong> (recommandé)<br><span class="muted" style="font-size:.85rem">On vous donne un 418/581/514 — vous le publiez sur Google</span></span>
        </label>
        <label style="display:flex;gap:10px;align-items:flex-start;font-weight:500;cursor:pointer;padding:12px;border:1px solid var(--border);border-radius:8px">
          <input type="radio" name="line_mode" value="hosted" style="margin-top:4px">
          <span><strong>Garder mon numéro actuel</strong> (portage)<br><span class="muted" style="font-size:.85rem">On porte votre ligne existante — activation sous 48h ouvrables</span></span>
        </label>
      </div>

      <div id="hostedFields" hidden>
        <label for="existing_number">Numéro à porter (celui sur Google) *</label>
        <input id="existing_number" type="tel" placeholder="581-555-1234">
      </div>

      <div id="newLineFields">
      <label for="area_code">Indicatif de votre nouvelle ligne</label>
      <select id="area_code">
        <option value="418">418 — Québec</option>
        <option value="581">581 — Québec</option>
        <option value="514">514 — Montréal</option>
        <option value="438">438 — Montréal</option>
        <option value="450">450 — Rive-Sud</option>
        <option value="819">819 — Est</option>
      </select>
      </div>

      <label for="missed_call_sms">Message SMS si appel manqué *</label>
      <textarea id="missed_call_sms" rows="3" required placeholder="Bonjour! Désolé, on a manqué votre appel à [Commerce]. Répondez ici — on vous répond tout de suite!"></textarea>

      <label for="agent_name">Prénom de votre agente SMS</label>
      <input id="agent_name" placeholder="Léa" value="Léa">

      <label for="contact_email">Courriel alertes (optionnel)</label>
      <input id="contact_email" type="email" placeholder="vous@commerce.com">

      <button type="submit" class="btn btn-accent" style="width:100%;margin-top:20px">Continuer vers la facturation →</button>
      <p id="err" class="err" hidden></p>
    </form>
  </div>
</div>
<script>
(async () => { await NoviaApp.requireAuth('/login.html'); })();

function syncLineModeUI() {
  const hosted = document.querySelector('input[name="line_mode"]:checked')?.value === 'hosted';
  document.getElementById('hostedFields').hidden = !hosted;
  document.getElementById('newLineFields').hidden = hosted;
  document.getElementById('existing_number').required = hosted;
}
document.querySelectorAll('input[name="line_mode"]').forEach((el) => {
  el.addEventListener('change', syncLineModeUI);
});

document.getElementById('form').onsubmit = async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.hidden = true;
  const name = document.getElementById('business_name').value.trim();
  const phone = document.getElementById('business_phone').value.trim();
  const sms = document.getElementById('missed_call_sms').value.trim();
  const lineMode = document.querySelector('input[name="line_mode"]:checked')?.value || 'new';
  const existingNum = document.getElementById('existing_number').value.trim();
  if (!name || !phone || !sms) {
    err.textContent = 'Remplissez tous les champs obligatoires.';
    err.hidden = false;
    return;
  }
  if (lineMode === 'hosted' && !existingNum) {
    err.textContent = 'Indiquez le numéro à porter.';
    err.hidden = false;
    return;
  }
  try {
    const res = await NoviaApp.api('api-tenant', {
      method: 'POST',
      body: JSON.stringify({
        onboarding: true,
        business_name: name,
        phone_forward: phone,
        agent_name: document.getElementById('agent_name').value.trim() || 'Léa',
        missed_call_sms: sms,
        area_code: document.getElementById('area_code').value,
        contact_email: document.getElementById('contact_email').value.trim(),
        line_mode: lineMode,
        existing_business_number: lineMode === 'hosted' ? existingNum : '',
      }),
    });
    if (res.error) throw new Error(res.error);
    sessionStorage.setItem('novia_provisioning', '1');
    sessionStorage.setItem('novia_show_link_guide', '1');
    location.href = '/dashboard.html?checkout=1';
  } catch (ex) {
    err.textContent = ex.message || 'Erreur';
    err.hidden = false;
  }
};
</script>
</body>
</html>
