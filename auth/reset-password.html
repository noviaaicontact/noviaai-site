<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau mot de passe | NoviaAI</title>
<link rel="stylesheet" href="/assets/saas.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/app.js"></script>
</head>
<body>
<nav class="nav"><a href="/" class="logo">Novia<span>AI</span></a></nav>
<div class="wizard-wrap">
  <div class="form-box" style="max-width:420px">
    <h1>Nouveau mot de passe</h1>
    <p class="muted">Choisissez un mot de passe d'au moins 8 caractères.</p>
    <form id="form">
      <label for="password">Nouveau mot de passe</label>
      <input id="password" type="password" required minlength="8" autocomplete="new-password">
      <label for="password2">Confirmer</label>
      <input id="password2" type="password" required minlength="8" autocomplete="new-password">
      <button type="submit" class="btn btn-accent btn-block" style="margin-top:24px">Enregistrer</button>
      <p id="err" class="err" hidden></p>
    </form>
  </div>
</div>
<script>
(async () => {
  const sb = await NoviaApp.getSupabase();
  if (!sb) return;
  const { data } = await sb.auth.getSession();
  if (!data.session) {
    document.querySelector('.form-box').innerHTML = '<h1>Lien expiré</h1><p class="muted">Demandez un nouveau lien depuis la <a href="/login.html">page de connexion</a>.</p>';
  }
})();
document.getElementById('form').onsubmit = async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.hidden = true;
  const p1 = document.getElementById('password').value;
  const p2 = document.getElementById('password2').value;
  if (p1 !== p2) {
    err.textContent = 'Les mots de passe ne correspondent pas.';
    err.hidden = false;
    return;
  }
  try {
    await NoviaApp.updatePassword(p1);
    location.href = '/login.html';
  } catch (ex) {
    err.textContent = ex.message || 'Erreur';
    err.hidden = false;
  }
};
</script>
</body>
</html>
